<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 메타 태그 -->
    <meta name="theme-color" content="#222222">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>벽돌 깨기</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        canvas {
            background-color: #111;
            border: 2px solid #555;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 360px;
            aspect-ratio: 360 / 650; 
        }

        /* 하단 컨트롤러 영역 (좌, 중앙, 우 배치) */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 360px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* 좌우 버튼 크기 키움 */
        .btn-dir {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        /* 중앙 발사/시작 버튼 영역 */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            align-items: center;
            padding: 0 10px;
        }
        
        button {
            background-color: #444;
            color: white;
            border: 2px solid #666;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            user-select: none;
            touch-action: manipulation;
        }
        button:active {
            background-color: #666;
            border-color: #999;
        }

        .btn-action {
            width: 100%;
            max-width: 130px;
            height: 45px;
            background-color: #0095DD;
            border-color: #007bb5;
        }
        .btn-action.start {
            background-color: #ff4757;
            border-color: #ff2a3d;
        }

        .instructions {
            margin-top: 15px;
            text-align: center;
            line-height: 1.4;
            color: #ddd;
            font-size: 13px;
            padding: 0 10px;
        }
        .highlight { color: #ffeb3b; font-weight: bold; }
        .danger { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="360" height="650"></canvas>
        
        <!-- 컨트롤 UI -->
        <div class="controls">
            <!-- 좌측 끝 -->
            <button class="btn-dir" id="btn-left">◀</button>
            
            <!-- 가로 중앙 -->
            <div class="actions">
                <button class="btn-action" id="btn-fire">발사 (Space)</button>
                <button class="btn-action start" id="btn-start">시작/재시작</button>
            </div>
            
            <!-- 우측 끝 -->
            <button class="btn-dir" id="btn-right">▶</button>
        </div>

        <div class="instructions">
            <strong>[점수]</strong> 기본: +10 | <span class="highlight">연속 파괴 시 콤보 보너스!</span><br>
            <span class="danger">※ 10초마다 벽돌 하강, 바닥에 닿으면 게임 오버!</span>
        </div>
    </div>

<script>
// --- PWA 서비스 워커 등록 ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker 등록 완료:', reg.scope))
            .catch(err => console.log('Service Worker 등록 실패:', err));
    });
}

// 게임 로직 시작
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBrickBreakSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function playTeleportSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.1); 
    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

let score = 0;
let bricksDestroyed = 0;
let lastMilestone = 0;
let isGameOver = true;

let combo = 0;
let comboTimer = 0;
const COMBO_DURATION = 180;

let brickDropTimer = 0;
const BRICK_DROP_INTERVAL = 600;

const MAX_BALLS = 30;
const BASE_SPEED = 2.5; 
const SPEED_INCREMENT = 0.08; 
const PADDLE_Y = canvas.height - 40; 

const keys = { ArrowLeft: false, ArrowRight: false };

const paddle = {
    width: 70, height: 12,
    x: canvas.width / 2 - 35, y: PADDLE_Y,
    speed: 4.5, dx: 0, dy: 0
};

let balls = [];
let bricks = [];
let particles = [];      
let floatingTexts = [];  

const holes = [
    { x: 0, y: 180, radius: 20, side: 'left' },
    { x: 0, y: 330, radius: 20, side: 'left' },
    { x: 0, y: 480, radius: 20, side: 'left' },
    { x: canvas.width, y: 220, radius: 20, side: 'right' },
    { x: canvas.width, y: 380, radius: 20, side: 'right' },
    { x: canvas.width, y: 530, radius: 20, side: 'right' }
];

const brickColumnCount = 6;
const brickWidth = 45;
const brickHeight = 20;
const brickPadding = 8;
const brickOffsetTop = 50;
const brickOffsetLeft = 25;

function initGame() {
    score = 0; bricksDestroyed = 0; lastMilestone = 0; isGameOver = false;
    combo = 0; comboTimer = 0; brickDropTimer = BRICK_DROP_INTERVAL;
    balls = []; particles = []; floatingTexts = [];
    paddle.x = canvas.width / 2 - paddle.width / 2;
    
    bricks = [];
    for (let r = 0; r < 4; r++) {
        let rowColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
        for (let c = 0; c < brickColumnCount; c++) {
            bricks.push({ c: c, r: r, status: 1, color: rowColor, x: 0, y: 0 });
        }
    }
    addAttachedBall();
}

function getCurrentTargetSpeed() { return BASE_SPEED + (bricksDestroyed * SPEED_INCREMENT); }

function addAttachedBall() {
    balls.push({
        x: paddle.x + paddle.width / 2, y: paddle.y - 10, radius: 6,
        dx: 0, dy: 0, attached: true, cooldown: 0, teleportCooldown: 0 
    });
}

function createParticles(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x, y: y, dx: (Math.random() - 0.5) * 6, dy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 1, life: 30, color: color
        });
    }
}

function createFloatingText(x, y, text, color) {
    floatingTexts.push({ x: x, y: y, text: text, color: color, life: 50, maxLife: 50, size: 12 });
}

function teleportBall(ball, entryHole) {
    let availableHoles = holes.filter(h => h !== entryHole);
    let exitHole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
    ball.y = exitHole.y;
    let speed = getCurrentTargetSpeed();
    let angle = (Math.random() * (Math.PI * 2 / 3)) - (Math.PI / 3);
    
    if (exitHole.side === 'left') {
        ball.x = exitHole.radius + ball.radius + 3;
        ball.dx = Math.cos(angle) * speed; ball.dy = Math.sin(angle) * speed; 
    } else {
        ball.x = canvas.width - exitHole.radius - ball.radius - 3;
        ball.dx = -Math.cos(angle) * speed; ball.dy = Math.sin(angle) * speed; 
    }
    ball.teleportCooldown = 15; 
    playTeleportSound();
    createParticles(entryHole.x, entryHole.y, "#9c88ff");
    createParticles(exitHole.x, exitHole.y, "#9c88ff");
}

function bindButtonEvent(btnId, keyName) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    const press = (e) => { e.preventDefault(); keys[keyName] = true; };
    const release = (e) => { e.preventDefault(); keys[keyName] = false; };
    btn.addEventListener("touchstart", press, { passive: false });
    btn.addEventListener("touchend", release, { passive: false });
    btn.addEventListener("mousedown", press);
    btn.addEventListener("mouseup", release);
    btn.addEventListener("mouseleave", release);
}

bindButtonEvent("btn-left", "ArrowLeft");
bindButtonEvent("btn-right", "ArrowRight");

const btnFire = document.getElementById("btn-fire");
const fireAction = (e) => {
    e.preventDefault();
    if(audioCtx.state === 'suspended') audioCtx.resume(); 
    let currentSpeed = getCurrentTargetSpeed();
    balls.forEach(ball => {
        if (ball.attached) {
            ball.attached = false;
            let angle = Math.random() * (Math.PI / 2) + (Math.PI / 4); 
            ball.dx = Math.cos(angle) * currentSpeed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -currentSpeed;
        }
    });
};
btnFire.addEventListener("touchstart", fireAction, { passive: false });
btnFire.addEventListener("mousedown", fireAction);

const btnStart = document.getElementById("btn-start");
const startAction = (e) => {
    e.preventDefault();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    initGame();
};
btnStart.addEventListener("touchstart", startAction, { passive: false });
btnStart.addEventListener("mousedown", startAction);

document.addEventListener("keydown", (e) => {
    if (e.code === "ArrowRight") keys.ArrowRight = true;
    if (e.code === "ArrowLeft") keys.ArrowLeft = true;
    if (e.code === "Space") fireAction(e);
});
document.addEventListener("keyup", (e) => {
    if (e.code === "ArrowRight") keys.ArrowRight = false;
    if (e.code === "ArrowLeft") keys.ArrowLeft = false;
});

function drawHoles() {
    holes.forEach(hole => {
        ctx.beginPath();
        if (hole.side === 'left') ctx.arc(hole.x, hole.y, hole.radius, -Math.PI / 2, Math.PI / 2);
        else ctx.arc(hole.x, hole.y, hole.radius, Math.PI / 2, Math.PI * 1.5);
        ctx.fillStyle = "#2c2c54"; ctx.fill();
        ctx.lineWidth = 3; ctx.strokeStyle = "#9c88ff"; ctx.stroke(); ctx.closePath();
    });
    ctx.lineWidth = 1; 
}

function drawPaddle() {
    ctx.beginPath();
    ctx.rect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.fillStyle = "#0095DD"; ctx.fill(); ctx.closePath();
}

function drawBalls() {
    balls.forEach(ball => {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.attached ? "#FFD700" : "#ffffff"; ctx.fill();
        ctx.strokeStyle = "#999"; ctx.stroke(); ctx.closePath();
    });
}

function drawBricks() {
    bricks.forEach(b => {
        if (b.status === 1) {
            ctx.beginPath();
            ctx.rect(b.x, b.y, brickWidth, brickHeight);
            ctx.fillStyle = b.color; ctx.fill(); ctx.closePath();
        }
    });
}

function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.fill(); ctx.closePath();
        ctx.globalAlpha = 1.0; 
        p.x += p.dx; p.y += p.dy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ctx.font = `bold ${ft.size}px Arial`; ctx.textAlign = "center";
        ctx.fillStyle = ft.color; ctx.globalAlpha = ft.life / ft.maxLife;
        ctx.fillText(ft.text, ft.x, ft.y); ctx.globalAlpha = 1.0;
        ft.y -= 0.8; ft.size += 0.2; ft.life--;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }
}

function drawScoreAndCombo() {
    ctx.font = "14px Arial"; ctx.fillStyle = "#fff"; ctx.textAlign = "left";
    ctx.fillText("Score: " + score, 8, 20); ctx.fillText("Balls: " + balls.length, 120, 20);
    
    if (combo > 1) {
        ctx.font = "bold 16px Arial"; ctx.fillStyle = "#ffeb3b";
        ctx.globalAlpha = comboTimer / COMBO_DURATION;
        ctx.fillText(`🔥 ${combo} COMBO!`, 200, 22); ctx.globalAlpha = 1.0;
    }
}

function drawGameState() {
    if (isGameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center";
        ctx.font = "bold 35px Arial"; ctx.fillStyle = "#ff4757";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "16px Arial"; ctx.fillStyle = "#ffffff";
        ctx.fillText("최종 점수: " + score, canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillText("부순 벽돌: " + bricksDestroyed + "개", canvas.width / 2, canvas.height / 2 + 50);
        ctx.font = "bold 14px Arial"; ctx.fillStyle = "#ffeb3b";
        ctx.fillText("시작 버튼을 눌러주세요", canvas.width / 2, canvas.height / 2 + 100);
    }
}

function update() {
    if (isGameOver) return; 

    let targetSpeed = getCurrentTargetSpeed();

    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) combo = 0; 
    }

    brickDropTimer--;
    if (brickDropTimer <= 0) {
        brickDropTimer = BRICK_DROP_INTERVAL;
        bricks.forEach(b => b.r++);
        let newRowColor = `hsl(${Math.floor(Math.random() * 360)}, 80%, 60%)`;
        for (let c = 0; c < brickColumnCount; c++) {
            bricks.push({ c: c, r: 0, status: 1, color: newRowColor, x: 0, y: 0 });
        }
    }

    if (keys.ArrowRight && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
    if (keys.ArrowLeft && paddle.x > 0) paddle.x -= paddle.speed;

    for (let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        if (b.status === 1) {
            b.x = (b.c * (brickWidth + brickPadding)) + brickOffsetLeft;
            b.y = (b.r * (brickHeight + brickPadding)) + brickOffsetTop;

            if (b.x < paddle.x + paddle.width && b.x + brickWidth > paddle.x &&
                b.y < paddle.y + paddle.height && b.y + brickHeight > paddle.y) isGameOver = true;
            if (b.y + brickHeight >= canvas.height) isGameOver = true;
        }
    }

    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];

        if (ball.cooldown > 0) ball.cooldown--;
        if (ball.teleportCooldown > 0) ball.teleportCooldown--;

        if (ball.attached) {
            ball.x = paddle.x + paddle.width / 2; ball.y = paddle.y - ball.radius; continue;
        }

        let currentVelocity = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        if (currentVelocity > 0) {
            ball.dx = (ball.dx / currentVelocity) * targetSpeed;
            ball.dy = (ball.dy / currentVelocity) * targetSpeed;
        }

        let nextX = ball.x + ball.dx; let nextY = ball.y + ball.dy; let teleportedThisFrame = false;

        if (nextX > canvas.width - ball.radius) {
            let entry = holes.find(h => h.side === 'right' && Math.abs(ball.y - h.y) < h.radius);
            if (entry && ball.teleportCooldown === 0) { teleportBall(ball, entry); teleportedThisFrame = true; } 
            else { ball.x = canvas.width - ball.radius; ball.dx = -Math.abs(ball.dx); }
        } else if (nextX < ball.radius) {
            let entry = holes.find(h => h.side === 'left' && Math.abs(ball.y - h.y) < h.radius);
            if (entry && ball.teleportCooldown === 0) { teleportBall(ball, entry); teleportedThisFrame = true; } 
            else { ball.x = ball.radius; ball.dx = Math.abs(ball.dx); }
        } else { ball.x = nextX; }

        if (!teleportedThisFrame) {
            if (nextY < ball.radius) { ball.y = ball.radius; ball.dy = Math.abs(ball.dy); } 
            else if (nextY > canvas.height + ball.radius) { balls.splice(i, 1); continue; } 
            else { ball.y = nextY; }
        }

        if (ball.dy > 0 && ball.x > paddle.x && ball.x < paddle.x + paddle.width &&
            ball.y + ball.radius > paddle.y && ball.y - ball.radius < paddle.y + paddle.height) {
            ball.dy = -Math.abs(ball.dy);
            let hitPoint = ball.x - (paddle.x + paddle.width / 2);
            ball.dx = hitPoint * 0.15; 
            let newVelocity = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            ball.dx = (ball.dx / newVelocity) * targetSpeed;
            ball.dy = (ball.dy / newVelocity) * targetSpeed;
        }

        for (let k = bricks.length - 1; k >= 0; k--) {
            let b = bricks[k];
            if (b.status === 1) {
                if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                    ball.dy = -ball.dy; b.status = 0; bricksDestroyed++;
                    combo++; comboTimer = COMBO_DURATION; 
                    let comboBonus = (combo > 1) ? (combo - 1) * 5 : 0; 
                    playBrickBreakSound();
                    createParticles(b.x + brickWidth / 2, b.y + brickHeight / 2, b.color);
                    let gainedScore = 10 + comboBonus;
                    let textStr = `+${gainedScore}`;
                    if (combo > 1) textStr += ` (${combo} Combo!)`; 
                    score += gainedScore;
                    createFloatingText(b.x + brickWidth / 2, b.y, textStr, "#ffffff");

                    if (bricksDestroyed - lastMilestone >= 10) { lastMilestone += 10; addAttachedBall(); }
                }
            }
        }
    }

    bricks = bricks.filter(b => b.status === 1);

    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            let b1 = balls[i]; let b2 = balls[j];
            if (b1.attached || b2.attached) continue;
            let dx = b1.x - b2.x; let dy = b1.y - b2.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < b1.radius + b2.radius) {
                let tempDx = b1.dx; let tempDy = b1.dy;
                b1.dx = b2.dx; b1.dy = b2.dy; b2.dx = tempDx; b2.dy = tempDy;
                let overlap = (b1.radius + b2.radius) - distance;
                b1.x += (dx / distance) * overlap; b1.y += (dy / distance) * overlap;

                if (b1.cooldown === 0 && b2.cooldown === 0 && balls.length < MAX_BALLS) {
                    b1.cooldown = 30; b2.cooldown = 30;
                    balls.push({
                        x: (b1.x + b2.x) / 2, y: (b1.y + b2.y) / 2, radius: 6,
                        dx: (Math.random() - 0.5) * targetSpeed, dy: (Math.random() - 0.5) * targetSpeed,
                        attached: false, cooldown: 60, teleportCooldown: 0
                    });
                }
            }
        }
    }

    if (balls.length === 0 && !isGameOver) isGameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawHoles(); drawBricks(); drawParticles(); drawFloatingTexts();  
    drawPaddle(); drawBalls(); drawScoreAndCombo(); drawGameState();
    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
