<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>업그레이드 벽돌 부수기</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            background-color: #111;
            border: 2px solid #555;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
            line-height: 1.5;
            color: #ddd;
            font-size: 14px;
        }
        .highlight { color: #ffeb3b; font-weight: bold; }
        .danger { color: #ff4757; font-weight: bold; }
        .portal { color: #9c88ff; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instructions">
        <strong>[조작 방법]</strong> 이동: 방향키 | 발사: 스페이스 | 확장: Ctrl 유지 | 재시작: F5<br>
        <strong>[점수 규칙]</strong> 기준선 위: <span class="highlight">+20점</span> | 기준선 아래: <span class="danger">-5점</span> | 기본: +10점<br>
        <span class="highlight">※ 연속 파괴 시 콤보(Combo) 보너스가 무한정 합산됩니다!</span><br>
        <span class="danger">※ 경고: 10초마다 벽돌이 내려오며, 벽돌이 바(Paddle)에 닿으면 즉시 게임 오버됩니다!</span>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- 웹 오디오 API (효과음) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBrickBreakSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 

    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function playTeleportSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.1); 

    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

// 게임 상태 변수
let score = 0;
let bricksDestroyed = 0;
let lastMilestone = 0;
let isGameOver = false;

// 콤보 시스템 변수
let combo = 0;
let comboTimer = 0;
const COMBO_DURATION = 180; // 3초 (60fps 기준)

// 벽돌 생성 타이머 (10초마다 하강)
let brickDropTimer = 0;
const BRICK_DROP_INTERVAL = 600; // 10초 (60fps 기준)

const MAX_BALLS = 30;
const BASE_SPEED = 2.5; 
const SPEED_INCREMENT = 0.08; 
const DEFAULT_PADDLE_Y = canvas.height - 50;

// 키보드 입력 상태 
const keys = {
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false, Ctrl: false
};

// 바(Paddle) 객체 설정 
const paddle = {
    width: 130, 
    height: 15,
    x: canvas.width / 2 - 65, 
    y: DEFAULT_PADDLE_Y,
    speed: 4, dx: 0, dy: 0,
    isExpanded: false 
};

// 배열들
let balls = [];
let bricks = [];
let particles = [];      
let floatingTexts = [];  

// 포탈(구멍) 설정
const holes = [
    { x: 0, y: 150, radius: 25, side: 'left' },
    { x: 0, y: 320, radius: 25, side: 'left' },
    { x: 0, y: 490, radius: 25, side: 'left' },
    { x: canvas.width, y: 200, radius: 25, side: 'right' },
    { x: canvas.width, y: 380, radius: 25, side: 'right' },
    { x: canvas.width, y: 450, radius: 25, side: 'right' }
];

// 벽돌 설정
const brickColumnCount = 10;
const brickWidth = 65;
const brickHeight = 25;
const brickPadding = 10;
const brickOffsetTop = 50;
const brickOffsetLeft = 35;

// 게임 초기화
function initGame() {
    score = 0;
    bricksDestroyed = 0;
    lastMilestone = 0;
    isGameOver = false;
    combo = 0;
    comboTimer = 0;
    brickDropTimer = BRICK_DROP_INTERVAL;
    
    balls = [];
    particles = [];
    floatingTexts = [];
    paddle.isExpanded = false;
    
    // 초기 벽돌 생성 (4줄)
    bricks = [];
    for (let r = 0; r < 4; r++) {
        let rowColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
        for (let c = 0; c < brickColumnCount; c++) {
            bricks.push({
                c: c, r: r, status: 1, color: rowColor, x: 0, y: 0
            });
        }
    }
    addAttachedBall();
}

function getCurrentTargetSpeed() {
    return BASE_SPEED + (bricksDestroyed * SPEED_INCREMENT);
}

function addAttachedBall() {
    balls.push({
        x: paddle.x + paddle.width / 2,
        y: paddle.y - 10,
        radius: 8,
        dx: 0, dy: 0,
        attached: true,
        cooldown: 0,
        teleportCooldown: 0 
    });
}

// 효과 유틸리티 함수들
function createParticles(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x, y: y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 1,
            life: 30, 
            color: color
        });
    }
}

function createFloatingText(x, y, text, color) {
    floatingTexts.push({
        x: x, y: y,
        text: text,
        color: color,
        life: 50, // 텍스트 유지 시간 
        maxLife: 50,
        size: 15    
    });
}

// 공 텔레포트 로직
function teleportBall(ball, entryHole) {
    let availableHoles = holes.filter(h => h !== entryHole);
    let exitHole = availableHoles[Math.floor(Math.random() * availableHoles.length)];
    
    ball.y = exitHole.y;
    
    let speed = getCurrentTargetSpeed();
    let angle = (Math.random() * (Math.PI * 2 / 3)) - (Math.PI / 3);
    
    if (exitHole.side === 'left') {
        ball.x = exitHole.radius + ball.radius + 3;
        ball.dx = Math.cos(angle) * speed; 
        ball.dy = Math.sin(angle) * speed; 
    } else {
        ball.x = canvas.width - exitHole.radius - ball.radius - 3;
        ball.dx = -Math.cos(angle) * speed; 
        ball.dy = Math.sin(angle) * speed; 
    }
    
    ball.teleportCooldown = 15; 
    
    playTeleportSound();
    createParticles(entryHole.x, entryHole.y, "#9c88ff");
    createParticles(exitHole.x, exitHole.y, "#9c88ff");
}

// 키보드 이벤트
document.addEventListener("keydown", (e) => {
    if (e.code === "ArrowRight") keys.ArrowRight = true;
    if (e.code === "ArrowLeft") keys.ArrowLeft = true;
    if (e.code === "ArrowUp") keys.ArrowUp = true;
    if (e.code === "ArrowDown") keys.ArrowDown = true;
    if (e.key === "Control") { 
        keys.Ctrl = true; 
        e.preventDefault(); 
    }
    if (e.code === "Space") {
        if(audioCtx.state === 'suspended') audioCtx.resume(); 
        let currentSpeed = getCurrentTargetSpeed();
        balls.forEach(ball => {
            if (ball.attached) {
                ball.attached = false;
                let angle = Math.random() * (Math.PI / 2) + (Math.PI / 4); 
                ball.dx = Math.cos(angle) * currentSpeed * (Math.random() > 0.5 ? 1 : -1);
                ball.dy = -currentSpeed;
            }
        });
        e.preventDefault();
    }
});
document.addEventListener("keyup", (e) => {
    if (e.code === "ArrowRight") keys.ArrowRight = false;
    if (e.code === "ArrowLeft") keys.ArrowLeft = false;
    if (e.code === "ArrowUp") keys.ArrowUp = false;
    if (e.code === "ArrowDown") keys.ArrowDown = false;
    if (e.key === "Control") { 
        keys.Ctrl = false; 
        e.preventDefault(); 
    }
});

// 그리기 함수들
function drawBaseline() {
    ctx.beginPath();
    ctx.setLineDash([5, 5]);
    ctx.moveTo(0, DEFAULT_PADDLE_Y);
    ctx.lineTo(canvas.width, DEFAULT_PADDLE_Y);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.closePath();
}

function drawHoles() {
    holes.forEach(hole => {
        ctx.beginPath();
        if (hole.side === 'left') {
            ctx.arc(hole.x, hole.y, hole.radius, -Math.PI / 2, Math.PI / 2);
        } else {
            ctx.arc(hole.x, hole.y, hole.radius, Math.PI / 2, Math.PI * 1.5);
        }
        ctx.fillStyle = "#2c2c54"; 
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#9c88ff"; 
        ctx.stroke();
        ctx.closePath();
    });
    ctx.lineWidth = 1; 
}

function drawPaddle() {
    ctx.beginPath();
    ctx.rect(paddle.x, paddle.y, paddle.width, paddle.height);
    if (paddle.y < DEFAULT_PADDLE_Y) ctx.fillStyle = "#ffeb3b"; 
    else if (paddle.y > DEFAULT_PADDLE_Y) ctx.fillStyle = "#ff4757"; 
    else ctx.fillStyle = "#0095DD"; 
    ctx.fill();
    ctx.closePath();
}

function drawBalls() {
    balls.forEach(ball => {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.attached ? "#FFD700" : "#ffffff";
        ctx.fill();
        ctx.strokeStyle = "#999";
        ctx.stroke();
        ctx.closePath();
    });
}

function drawBricks() {
    bricks.forEach(b => {
        if (b.status === 1) {
            ctx.beginPath();
            ctx.rect(b.x, b.y, brickWidth, brickHeight);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.closePath();
        }
    });
}

function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.fill();
        ctx.closePath();
        ctx.globalAlpha = 1.0; 
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ctx.font = `bold ${ft.size}px Arial`;
        ctx.textAlign = "center";
        ctx.fillStyle = ft.color;
        ctx.globalAlpha = ft.life / ft.maxLife;
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1.0;
        ft.y -= 0.8; 
        ft.size += 0.3; 
        ft.life--;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }
}

function drawScoreAndCombo() {
    ctx.font = "16px Arial";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.fillText("Score: " + score, 8, 20);
    ctx.fillText("Balls: " + balls.length, 120, 20);
    
    // 콤보 표시
    if (combo > 1) {
        ctx.font = "bold 18px Arial";
        ctx.fillStyle = "#ffeb3b";
        // 콤보 타이머에 따라 글씨가 깜빡이거나 투명해지는 효과
        ctx.globalAlpha = comboTimer / COMBO_DURATION;
        ctx.fillText(`🔥 ${combo} COMBO!`, 220, 22);
        ctx.globalAlpha = 1.0;
    }
}

function drawGameState() {
    if (isGameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center";
        
        ctx.font = "bold 50px Arial";
        ctx.fillStyle = "#ff4757";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

        ctx.font = "20px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("최종 점수: " + score, canvas.width / 2, canvas.height / 2 + 30);
        ctx.fillText("생존 및 부순 벽돌: " + bricksDestroyed + "개", canvas.width / 2, canvas.height / 2 + 60);
        ctx.fillText("Press F5 to Restart", canvas.width / 2, canvas.height / 2 + 100);
    }
}

// 충돌 및 물리 업데이트
function update() {
    if (isGameOver) return; 

    let targetSpeed = getCurrentTargetSpeed();

    // 콤보 타이머 감소
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) combo = 0; // 콤보 초기화
    }

    // 시간 경과에 따른 벽돌 하강 로직 (10초마다)
    brickDropTimer--;
    if (brickDropTimer <= 0) {
        brickDropTimer = BRICK_DROP_INTERVAL;
        
        // 기존 벽돌 아래로 한칸 이동
        bricks.forEach(b => b.r++);
        
        // 맨 위에 새로운 줄 추가
        let newRowColor = `hsl(${Math.floor(Math.random() * 360)}, 80%, 60%)`;
        for (let c = 0; c < brickColumnCount; c++) {
            bricks.push({
                c: c, r: 0, status: 1, color: newRowColor, x: 0, y: 0
            });
        }
    }

    // Ctrl 키 입력 및 패널티
    let targetWidth = keys.Ctrl ? 200 : 130;
    if (keys.Ctrl && !paddle.isExpanded) {
        paddle.isExpanded = true;
        score -= 10;
        if (score < 0) score = 0;
        createFloatingText(paddle.x + paddle.width / 2, paddle.y, "-10", "#ff4757");
    } else if (!keys.Ctrl && paddle.isExpanded) {
        paddle.isExpanded = false;
    }
    if (paddle.width !== targetWidth) {
        paddle.x -= (targetWidth - paddle.width) / 2;
        paddle.width = targetWidth;
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
    }

    // 1. 바 이동
    if (keys.ArrowRight && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
    if (keys.ArrowLeft && paddle.x > 0) paddle.x -= paddle.speed;
    if (keys.ArrowUp && paddle.y > canvas.height * 0.5) paddle.y -= paddle.speed;
    if (keys.ArrowDown && paddle.y < canvas.height - paddle.height) paddle.y += paddle.speed;

    // 2. 벽돌 좌표 업데이트 및 게임오버 검사
    for (let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        if (b.status === 1) {
            b.x = (b.c * (brickWidth + brickPadding)) + brickOffsetLeft;
            b.y = (b.r * (brickHeight + brickPadding)) + brickOffsetTop;

            // [게임 오버] 벽돌이 바(Paddle)와 충돌(겹침)하거나 화면 아래로 넘어가면 패배!
            if (b.x < paddle.x + paddle.width &&
                b.x + brickWidth > paddle.x &&
                b.y < paddle.y + paddle.height &&
                b.y + brickHeight > paddle.y) {
                isGameOver = true;
            }
            if (b.y + brickHeight >= canvas.height) {
                isGameOver = true;
            }
        }
    }

    // 3. 공 업데이트
    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];

        if (ball.cooldown > 0) ball.cooldown--;
        if (ball.teleportCooldown > 0) ball.teleportCooldown--;

        if (ball.attached) {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius;
            continue;
        }

        let currentVelocity = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        if (currentVelocity > 0) {
            ball.dx = (ball.dx / currentVelocity) * targetSpeed;
            ball.dy = (ball.dy / currentVelocity) * targetSpeed;
        }

        let nextX = ball.x + ball.dx;
        let nextY = ball.y + ball.dy;
        let teleportedThisFrame = false;

        // 벽 & 포탈 충돌
        if (nextX > canvas.width - ball.radius) {
            let entry = holes.find(h => h.side === 'right' && Math.abs(ball.y - h.y) < h.radius);
            if (entry && ball.teleportCooldown === 0) {
                teleportBall(ball, entry);
                teleportedThisFrame = true;
            } else {
                ball.x = canvas.width - ball.radius;
                ball.dx = -Math.abs(ball.dx); 
            }
        } else if (nextX < ball.radius) {
            let entry = holes.find(h => h.side === 'left' && Math.abs(ball.y - h.y) < h.radius);
            if (entry && ball.teleportCooldown === 0) {
                teleportBall(ball, entry);
                teleportedThisFrame = true;
            } else {
                ball.x = ball.radius;
                ball.dx = Math.abs(ball.dx); 
            }
        } else {
            ball.x = nextX;
        }

        if (!teleportedThisFrame) {
            if (nextY < ball.radius) {
                ball.y = ball.radius;
                ball.dy = Math.abs(ball.dy); 
            } else if (nextY > canvas.height + ball.radius) {
                balls.splice(i, 1); 
                continue;
            } else {
                ball.y = nextY;
            }
        }

        // 바(Paddle) 충돌 감지
        if (ball.dy > 0 && 
            ball.x > paddle.x && ball.x < paddle.x + paddle.width &&
            ball.y + ball.radius > paddle.y && ball.y - ball.radius < paddle.y + paddle.height) {
            
            ball.dy = -Math.abs(ball.dy);
            let hitPoint = ball.x - (paddle.x + paddle.width / 2);
            ball.dx = hitPoint * 0.10; 
            
            let newVelocity = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            ball.dx = (ball.dx / newVelocity) * targetSpeed;
            ball.dy = (ball.dy / newVelocity) * targetSpeed;
        }

        // 벽돌 충돌 감지 (거꾸로 반복하여 안전하게 삭제처리)
        for (let k = bricks.length - 1; k >= 0; k--) {
            let b = bricks[k];
            if (b.status === 1) {
                if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                    ball.dy = -ball.dy;
                    b.status = 0; // 파괴 처리
                    bricksDestroyed++;
                    
                    // 콤보 적용 로직
                    combo++;
                    comboTimer = COMBO_DURATION; // 콤보 타이머 갱신 (3초)
                    let comboBonus = (combo > 1) ? (combo - 1) * 5 : 0; // 2콤보부터 5점씩 추가

                    playBrickBreakSound();
                    createParticles(b.x + brickWidth / 2, b.y + brickHeight / 2, b.color);
                    
                    let gainedScore = 0;
                    let textColor = "#ffffff";
                    let textStr = "";

                    // 기본 점수 판정
                    if (paddle.y < DEFAULT_PADDLE_Y) { gainedScore = 20; textColor = "#ffeb3b"; } 
                    else if (paddle.y > DEFAULT_PADDLE_Y) { gainedScore = -5; textColor = "#ff4757"; } 
                    else { gainedScore = 10; textColor = "#ffffff"; }

                    // 감점이 아닐 때만 콤보 보너스 합산
                    if (gainedScore > 0) {
                        gainedScore += comboBonus;
                        textStr = `+${gainedScore}`;
                        if (combo > 1) textStr += ` (${combo} Combo!)`; // 텍스트에 콤보 표시
                    } else {
                        textStr = `${gainedScore}`;
                    }

                    score += gainedScore;
                    if (score < 0) score = 0; 
                    
                    createFloatingText(b.x + brickWidth / 2, b.y, textStr, textColor);

                    if (bricksDestroyed - lastMilestone >= 10) {
                        lastMilestone += 10;
                        addAttachedBall();
                    }
                }
            }
        }
    }

    // 파괴된 벽돌 배열에서 정리
    bricks = bricks.filter(b => b.status === 1);

    // 4. 공과 공 충돌 감지
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            let b1 = balls[i];
            let b2 = balls[j];

            if (b1.attached || b2.attached) continue;

            let dx = b1.x - b2.x;
            let dy = b1.y - b2.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < b1.radius + b2.radius) {
                let tempDx = b1.dx; let tempDy = b1.dy;
                b1.dx = b2.dx; b1.dy = b2.dy;
                b2.dx = tempDx; b2.dy = tempDy;

                let overlap = (b1.radius + b2.radius) - distance;
                b1.x += (dx / distance) * overlap;
                b1.y += (dy / distance) * overlap;

                if (b1.cooldown === 0 && b2.cooldown === 0 && balls.length < MAX_BALLS) {
                    b1.cooldown = 30; b2.cooldown = 30;
                    balls.push({
                        x: (b1.x + b2.x) / 2, y: (b1.y + b2.y) / 2, radius: 8,
                        dx: (Math.random() - 0.5) * targetSpeed, dy: (Math.random() - 0.5) * targetSpeed,
                        attached: false, cooldown: 60, teleportCooldown: 0
                    });
                }
            }
        }
    }

    if (balls.length === 0 && !isGameOver) {
        isGameOver = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawHoles();          
    drawBaseline(); 
    drawBricks();
    drawParticles();      
    drawFloatingTexts();  
    drawPaddle();
    drawBalls();
    drawScoreAndCombo();
    drawGameState();
    
    update();
    
    requestAnimationFrame(draw);
}

initGame();
draw();

</script>
</body>
